{% extends "base.html" %}
{% block title %}Import from URL — Iris{% endblock %}
{% block content %}
<div class="form-container">
    <div class="form-section">
        <h2>Import Image from URL</h2>
        <p style="color: var(--text-muted); margin-bottom: 16px;">Paste the image URL. The image will be downloaded and queued for auto-processing.</p>
        <form method="post">
            <div class="form-group">
                <label>Image URL</label>
                <input type="url" name="url" placeholder="https://example.com/image.jpg" required>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Import</button>
                <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
