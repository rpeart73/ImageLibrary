{% extends "base.html" %}
{% block title %}Themes — Iris{% endblock %}
{% block content %}
<div class="theme-grid">
    {% for theme in themes %}
    <a href="{{ url_for('browse', theme=theme.name) }}" class="theme-card">
        <div class="count">{{ theme.image_count }}</div>
        <h3>{{ theme.name }}</h3>
        <div class="desc">{{ theme.description }}</div>
    </a>
    {% endfor %}
</div>
{% endblock %}
