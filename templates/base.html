<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Iris{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="description" content="Iris: Curriculum-aware research intelligence. 26 databases, Two-Eyed Seeing, citation export, Zotero pipeline, image library.">
</head>
<body>
    <nav class="nav">
        <a href="{{ url_for('research') }}" class="nav-brand">Iris</a>
        <div class="nav-links">
            <a href="{{ url_for('research') }}" class="{{ 'active' if request.endpoint == 'research' }}">Research</a>
            <a href="{{ url_for('library') }}" class="{{ 'active' if request.endpoint == 'library' }}">Library</a>
            <a href="{{ url_for('browse') }}" class="{{ 'active' if request.endpoint == 'browse' }}">Browse</a>
            <a href="{{ url_for('themes') }}" class="{{ 'active' if request.endpoint == 'themes' }}">Themes</a>
            <a href="{{ url_for('media_list') }}" class="{{ 'active' if request.endpoint in ('media_list', 'media_detail') }}">Media</a>
            <a href="{{ url_for('upload') }}" class="{{ 'active' if request.endpoint == 'upload' }}">Upload</a>
            <a href="{{ url_for('import_url') }}" class="{{ 'active' if request.endpoint == 'import_url' }}">Import URL</a>
        </div>
        <form class="nav-search" action="{{ url_for('library') }}" method="get">
            <input type="text" name="q" placeholder="Search images..." value="{{ search or '' }}">
        </form>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}

    <script>
        // Copy APA citation on click
        document.querySelectorAll('.apa-citation').forEach(el => {
            el.addEventListener('click', () => {
                navigator.clipboard.writeText(el.textContent.trim());
                el.style.borderColor = '#7ee787';
                setTimeout(() => el.style.borderColor = '', 1500);
            });
        });
    </script>
</body>
</html>
